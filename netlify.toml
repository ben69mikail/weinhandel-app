[build]
  # --include=dev ist zwingend: NODE_ENV=production (Runtime-Variable der Function)
  # würde npm sonst die devDependencies überspringen lassen — tsc, vite und die
  # Prisma-CLI fehlen dann und der Build bricht mit Exit-Code 2 ab.
  command   = "npm install --include=dev && npm run generate --workspace=packages/backend && npm run build --workspace=packages/backend && npm run build --workspace=packages/frontend"
  publish   = "packages/frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  PRISMA_CLI_BINARY_TARGETS = "rhel-openssl-3.0.x"

[functions]
  node_bundler          = "esbuild"
  external_node_modules = ["@prisma/client", ".prisma"]
  included_files        = ["node_modules/.prisma/client/**", "packages/backend/prisma/schema.prisma"]

# API als Netlify Function unter derselben Domain wie das Frontend.
# Doppeltes /api ist Absicht: serverless-http entfernt den Function-Pfad (basePath),
# übrig bleibt /api/... — genau das, was Express erwartet.
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/api/:splat"
  status = 200
  force  = true

# SPA-Fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
